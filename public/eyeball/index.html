<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Сечение</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="brand">СЕЧЕНИЕ</div>
    <div class="record" id="record">&nbsp;</div>

    <div class="stats">
      <div class="stat"><span class="lbl">BEST</span><span class="val" id="best">—</span></div>
      <div class="stat"><span class="lbl">AVG</span><span class="val" id="avg">—</span></div>
      <div class="stat streak-stat"><span class="lbl">STREAK</span><span class="val streak-val" id="streak">0</span></div>
      <div class="stat"><span class="lbl">ROUND</span><span class="val" id="rounds">0</span></div>
      <button id="reset" class="reset-btn" type="button">↺</button>
    </div>
  </header>

  <main>
    <div class="task-wrap">
      <div class="task" id="task">&nbsp;</div>
    </div>

    <div class="line-zone" id="line-zone">
      <svg id="track" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"></svg>
    </div>

    <div class="feedback">
      <div class="hint" id="hint">нажми, тяни по линии, отпусти</div>
      <div class="result hidden" id="result">
        <div class="accuracy" id="accuracy">—</div>
        <div class="status" id="status">—</div>
      </div>
    </div>

    <div class="next-hint hidden" id="next-hint">нажми для новой попытки</div>

    <div class="actions" id="actions">
      <button id="share" class="btn hidden" type="button">Поделиться</button>
      <button id="leaderboard-btn" class="btn" type="button">Топ чата</button>
    </div>
  </main>

  <div id="lb-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Топ чата</h3>

      <div class="lb-me hidden" id="lb-me">
        <div class="lb-me-row">
          <div class="lb-me-stat"><div class="lb-me-lbl">лучшая</div><div class="lb-me-val" id="me-best">—</div></div>
          <div class="lb-me-stat"><div class="lb-me-lbl">серия</div><div class="lb-me-val" id="me-streak">—</div></div>
          <div class="lb-me-stat"><div class="lb-me-lbl">раундов</div><div class="lb-me-val" id="me-rounds">—</div></div>
          <div class="lb-me-stat"><div class="lb-me-lbl">место</div><div class="lb-me-val" id="me-rank">—</div></div>
        </div>
        <div class="lb-me-compare" id="lb-me-compare"></div>
      </div>

      <div class="lb-divider"></div>
      <div id="lb-list" class="lb-list"></div>
      <button id="lb-close" class="btn" type="button">Закрыть</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
